<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Novel Reader</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <script src="decrypt.js"></script>
  <script src="script.js"></script>
</head>
<body>
  <header>
    <div class="nav">
      <button id="navLeftTop"></button>
      <span id="chapterNumber" style="cursor: pointer;">Chapter</span>
      <button id="navRightTop"></button>
    </div>
  </header>
  <main>
    <h1 id="chapterTitle"></h1>
    <div id="chapterContent" class="content"></div>
  </main>
  <footer>
    <div class="nav">
      <button id="navLeftBottom"></button>
      <span id="chapterNumberBottom" style="cursor: pointer;">Chapter</span>
      <button id="navRightBottom"></button>
    </div>
  </footer>

  <div id="chapterPopup" class="popup-overlay">
    <div class="popup-content">
      <h2>Chapter Selection</h2>
      <div id="chapterList" class="chapter-list"></div>
    </div>
  </div>

    <script>
    window.forwardWindowSize = 130;
    window.backwardWindowSize = 20;

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registered successfully'))
          .catch(err => console.error('Service Worker registration failed:', err));
      });

      navigator.serviceWorker.ready.then(() => {
        // Trigger initial cache population once the SW is active
        const params = new URLSearchParams(window.location.search);
        const chapter = parseInt(params.get('chapter'), 10) || parseInt(localStorage.getItem('lastChapter'), 10) || 1;
        notifySW(chapter, true);
      });
    }

    function notifySW(chapter, forceUpdate = false) {
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
          type: 'CHAPTER_CHANGED',
          chapter: chapter,
          forward: window.forwardWindowSize,
          backward: window.backwardWindowSize,
          force: forceUpdate
        });
      }
    }

    // Intercept chapter changes without touching script.js
    // script.js calls history.replaceState whenever a new chapter loads
    const originalReplaceState = history.replaceState;
    history.replaceState = function() {
      originalReplaceState.apply(this, arguments);
      const params = new URLSearchParams(window.location.search);
      const chapter = parseInt(params.get('chapter'), 10);
      if (chapter) notifySW(chapter);
    };

    // Expose function to console
    window.updateCacheWindow = function(forward, backward) {
      if (forward !== undefined) window.forwardWindowSize = forward;
      if (backward !== undefined) window.backwardWindowSize = backward;
      
      const params = new URLSearchParams(window.location.search);
      const chapter = parseInt(params.get('chapter'), 10) || parseInt(localStorage.getItem('lastChapter'), 10) || 1;
      
      notifySW(chapter, true); // Force SW to re-evaluate the window immediately
      console.log(`Cache window updated. Forward: ${window.forwardWindowSize}, Backward: ${window.backwardWindowSize}`);
    };
    </script>
</body>
</html>
