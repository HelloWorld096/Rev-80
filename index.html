<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novel Reader</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="decrypt.js"></script>
    <script src="script.js" defer></script>
  </head>

  <body>
    <header>
      <div class="nav">
        <button id="navLeftTop"  aria-label="Previous chapter"></button>
        <span   id="chapterNumber">Chapter</span>
        <button id="navRightTop" aria-label="Next chapter"></button>
      </div>
    </header>

    <main>
      <h1 id="chapterTitle"></h1>
      <div id="chapterContent" class="content"></div>
    </main>

    <footer>
      <div class="nav">
        <button id="navLeftBottom"  aria-label="Previous chapter"></button>
        <span   id="chapterNumberBottom">Chapter</span>
        <button id="navRightBottom" aria-label="Next chapter"></button>
      </div>
    </footer>

    <div id="chapterPopup" class="popup-overlay" role="dialog" aria-modal="true" aria-label="Chapter selection">
      <div class="popup-content">

        <div class="popup-header">
          <h2>Chapters</h2>
          <div class="popup-pager">
            <button id="popupPrevPage" aria-label="Previous page">&#8249;</button>
            <span   id="popupPageInfo"></span>
            <button id="popupNextPage" aria-label="Next page">&#8250;</button>
          </div>
        </div>

        <div id="chapterList" class="chapter-list"></div>

      </div>
    </div>
  </body>
</html>
